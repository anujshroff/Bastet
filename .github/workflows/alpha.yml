name: Alpha
on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency: alpha

permissions:
  packages: write
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.build.outputs.VERSION }}
      MAJOR: ${{ steps.build.outputs.MAJOR }}
      MINOR: ${{ steps.build.outputs.MINOR }}

    steps:
      - uses: actions/checkout@v6
        name: Checkout
        with:
          fetch-depth: 0

      - id: build
        uses: ./.github/actions/build/
        name: Build

  sign:
    needs: publish
    runs-on: windows-latest
    environment: code-signing

    steps:
      - uses: actions/checkout@v6
        name: Checkout

      - uses: ./.github/actions/sign/
        name: Sign
        with:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE }}

  deploy:
    needs: [publish, sign]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        name: Checkout
        with:
          fetch-depth: 0

      - uses: ./.github/actions/deploy/
        name: Deploy
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.publish.outputs.VERSION }}
          MAJOR: ${{ needs.publish.outputs.MAJOR }}
          MINOR: ${{ needs.publish.outputs.MINOR }}
