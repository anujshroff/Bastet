name: 'Alpha'
description: 'Alpha'
inputs:
  CONFIGURATION:
    required: false
    default: 'Release'
  DOTNET_CORE_VERSION: 
    required: false
    default: '10.x'
  GITHUB_TOKEN:
    required: true
  AZURE_CLIENT_ID:
    required: true
  AZURE_TENANT_ID:
    required: true
  AZURE_SUBSCRIPTION_ID:
    required: true
  TRUSTED_SIGNING_ENDPOINT:
    required: true
  TRUSTED_SIGNING_ACCOUNT:
    required: true
  TRUSTED_SIGNING_CERTIFICATE_PROFILE:
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.DOTNET_CORE_VERSION }}

    - name: Build
      run: dotnet build --configuration ${{ inputs.CONFIGURATION }} /p:Version=0.0.0 /p:AssemblyVersion=0.0.0.0
      shell: bash

    - name: Test
      run: dotnet test --configuration ${{ inputs.CONFIGURATION }} --no-build
      shell: bash

    - name: Publish
      run: |
        dotnet publish ${{ github.workspace }}/src/Bastet --configuration ${{ inputs.CONFIGURATION }} --no-build --output ${{ github.workspace }}/publish
      shell: bash

    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ inputs.AZURE_CLIENT_ID }}
        tenant-id: ${{ inputs.AZURE_TENANT_ID }}
        subscription-id: ${{ inputs.AZURE_SUBSCRIPTION_ID }}

    - name: Install Sign CLI
      run: dotnet tool install --global sign --prerelease
      shell: bash

    - name: Sign Bastet.dll
      run: |
        sign code artifact-signing `
          -ase "${{ inputs.TRUSTED_SIGNING_ENDPOINT }}" `
          -asa "${{ inputs.TRUSTED_SIGNING_ACCOUNT }}" `
          -ascp "${{ inputs.TRUSTED_SIGNING_CERTIFICATE_PROFILE }}" `
          "${{ github.workspace }}/publish/Bastet.dll"
      shell: pwsh

    - name: Switch Docker to Linux Engine
      run: |
        & "$env:ProgramFiles\Docker\Docker\DockerCli.exe" -SwitchLinuxEngine
      shell: pwsh

    - name: Docker Build
      run: |
          echo "${{ inputs.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build ${{ github.workspace }}/publish --file ${{ github.workspace }}/src/Bastet/Dockerfile --tag=ghcr.io/${{ github.repository_owner }}/bastet:alpha
          docker push -a ghcr.io/${{ github.repository_owner }}/bastet
      shell: bash
