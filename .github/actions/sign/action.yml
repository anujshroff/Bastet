name: 'Sign Bastet.dll'
description: 'Download Bastet.dll, sign with Azure Trusted Signing, upload signed DLL'
inputs:
  AZURE_CLIENT_ID:
    required: true
  AZURE_TENANT_ID:
    required: true
  AZURE_SUBSCRIPTION_ID:
    required: true
  TRUSTED_SIGNING_ENDPOINT:
    required: true
  TRUSTED_SIGNING_ACCOUNT:
    required: true
  TRUSTED_SIGNING_CERTIFICATE_PROFILE:
    required: true

runs:
  using: 'composite'
  steps:
    - name: Download Bastet.dll
      uses: actions/download-artifact@v8
      with:
        name: bastet-dll
        path: ${{ github.workspace }}/to-sign

    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ inputs.AZURE_CLIENT_ID }}
        tenant-id: ${{ inputs.AZURE_TENANT_ID }}
        subscription-id: ${{ inputs.AZURE_SUBSCRIPTION_ID }}

    - name: Install Sign CLI
      run: dotnet tool install --global sign --prerelease
      shell: pwsh

    - name: Sign Bastet.dll
      run: |
        sign code artifact-signing `
          -ase "${{ inputs.TRUSTED_SIGNING_ENDPOINT }}" `
          -asa "${{ inputs.TRUSTED_SIGNING_ACCOUNT }}" `
          -ascp "${{ inputs.TRUSTED_SIGNING_CERTIFICATE_PROFILE }}" `
          "${{ github.workspace }}/to-sign/Bastet.dll"
      shell: pwsh

    - name: Upload Signed Bastet.dll
      uses: actions/upload-artifact@v7
      with:
        name: bastet-dll-signed
        path: ${{ github.workspace }}/to-sign/Bastet.dll
        retention-days: 1
        if-no-files-found: error
