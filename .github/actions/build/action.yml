name: 'Build'
description: 'Build'
inputs:
  CONFIGURATION:
    required: false
    default: 'Release'
  DOTNET_CORE_VERSION: 
    required: false
    default: '10.x'

outputs:
  VERSION:
    value: ${{ steps.nextversion.outputs.VERSION || '0.0.0' }}
  MAJOR:
    value: ${{ steps.nextversion.outputs.MAJOR || '0' }}
  MINOR:
    value: ${{ steps.nextversion.outputs.MINOR || '0' }}

runs:
  using: 'composite'
  steps:
    - name: Detect Mode
      id: mode
      run: |
        if [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
          echo "is_release=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_release=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.DOTNET_CORE_VERSION }}

    - name: Run Branch Release Versioning
      id: nextversion
      if: steps.mode.outputs.is_release == 'true'
      uses: ./.github/actions/versioning

    - name: Build
      run: dotnet build --configuration ${{ inputs.CONFIGURATION }} /p:Version=${{ steps.nextversion.outputs.VERSION || '0.0.0' }} /p:AssemblyVersion=${{ steps.nextversion.outputs.ASSEMBLYSEMVER || '0.0.0.0' }}
      shell: bash

    - name: Test
      run: dotnet test --configuration ${{ inputs.CONFIGURATION }} --no-build
      shell: bash

    - name: Publish
      run: |
        dotnet publish ${{ github.workspace }}/src/Bastet --configuration ${{ inputs.CONFIGURATION }} --no-build --output ${{ github.workspace }}/publish
      shell: bash

    - name: Upload Publish Folder
      uses: actions/upload-artifact@v7
      with:
        name: publish-folder
        path: ${{ github.workspace }}/publish
        retention-days: 1
        if-no-files-found: error

    - name: Upload Bastet.dll
      uses: actions/upload-artifact@v7
      with:
        name: bastet-dll
        path: ${{ github.workspace }}/publish/Bastet.dll
        retention-days: 1
        if-no-files-found: error
